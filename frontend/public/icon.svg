<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="nd" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#082e36"/>
      <stop offset="40%" stop-color="#10525e"/>
      <stop offset="100%" stop-color="#1a7080"/>
    </linearGradient>
    <linearGradient id="nl" x1="0.2" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18707e"/>
      <stop offset="50%" stop-color="#2c9cac"/>
      <stop offset="100%" stop-color="#44b8c8"/>
    </linearGradient>
    <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8ccd4"/>
      <stop offset="50%" stop-color="#a8aeb8"/>
      <stop offset="100%" stop-color="#c8ccd4"/>
    </linearGradient>
    <linearGradient id="rd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#166a78"/>
      <stop offset="100%" stop-color="#1a7a8a"/>
    </linearGradient>
    <linearGradient id="rl" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1e8494"/>
      <stop offset="100%" stop-color="#2a96a6"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="url(#rg)" stroke-width="14" opacity="0.55"/>

  <!-- Compass rose: 4 wide arrow arms extending through the ring -->
  <!-- North -->
  <path d="M100,10 L76,74 L100,56 Z" fill="url(#rd)"/>
  <path d="M100,10 L124,74 L100,56 Z" fill="url(#rl)"/>
  <!-- South -->
  <path d="M100,190 L124,126 L100,144 Z" fill="url(#rl)"/>
  <path d="M100,190 L76,126 L100,144 Z" fill="url(#rd)"/>
  <!-- East -->
  <path d="M190,100 L126,76 L144,100 Z" fill="url(#rd)"/>
  <path d="M190,100 L126,124 L144,100 Z" fill="url(#rl)"/>
  <!-- West -->
  <path d="M10,100 L74,124 L56,100 Z" fill="url(#rl)"/>
  <path d="M10,100 L74,76 L56,100 Z" fill="url(#rd)"/>

  <!-- Main needle: smooth blade from (155,16) to (45,184) -->
  <!-- Dark face (upper-left curved edge) — slightly narrower -->
  <path d="M155,16 Q65,72 45,184 L100,100 Z" fill="url(#nd)"/>
  <!-- Light face (lower-right curved edge) -->
  <path d="M155,16 Q135,128 45,184 L100,100 Z" fill="url(#nl)" opacity="0.88"/>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="10" fill="white"/>
  <circle cx="100" cy="100" r="6.5" fill="#e4e6ea"/>
</svg>
